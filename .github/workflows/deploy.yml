# =============================================================================
# Griote Platform — Deploy Pipeline
# =============================================================================
#
# Déclenché sur push main ou dispatch manuel.
#
# Ordre des jobs (séquentiel, tout s'arrête si un job échoue) :
#   1. test          — lint + tests unitaires sur le runner GitHub
#   2. build         — build & push images Docker (parallel backend/frontend)
#   3. deploy        — SSH : backup → migrate → seed:prod → déploiement
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   — Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token
#   SERVER_HOST          — IP ou hostname du VPS
#   SERVER_USER          — Utilisateur SSH (ex: root)
#   SERVER_SSH_KEY       — Clé privée SSH (format PEM)
#
# Server prerequisites:
#   - Docker + Docker Compose plugin installés
#   - Traefik en cours d'exécution sur le réseau "traefik-public"
#   - /root/griote/.env présent (depuis .env.example)
# =============================================================================

name: Deploy — Griote Platform

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service à rebuilder"
        required: false
        default: "all"
        type: choice
        options: [all, backend, frontend]

env:
  BACKEND_IMAGE: brandoniscoding/backend-griote
  FRONTEND_IMAGE: brandoniscoding/frontend-griote
  DEPLOY_PATH: /root/griote

jobs:
  # ---------------------------------------------------------------------------
  # 1. TEST — lint + tests unitaires (fail fast)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     griote_test
          POSTGRES_PASSWORD: griote_test
          POSTGRES_DB:       griote_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U griote_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DB_URI:   postgres://griote_test:griote_test@localhost:5432/griote_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations (test DB)
        working-directory: backend
        run: npm run db:migrate

      - name: Run unit tests
        working-directory: backend
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # 2. BUILD — images Docker en parallèle (après test réussi)
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    needs: test
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event.inputs.service == 'backend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event.inputs.service == 'frontend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ---------------------------------------------------------------------------
  # 3. DEPLOY — backup → migrate → seed:prod → déploiement
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.SERVER_HOST }}
          username:  ${{ secrets.SERVER_USER }}
          key:       ${{ secrets.SERVER_SSH_KEY }}
          source:    "docker-compose.prod.yml"
          target:    "${{ env.DEPLOY_PATH }}/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.SERVER_HOST }}
          username:        ${{ secrets.SERVER_USER }}
          key:             ${{ secrets.SERVER_SSH_KEY }}
          timeout:         60s
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            echo "══════════════════════════════════════════════════"
            echo "  Griote Platform — Deployment"
            echo "  Date   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
            echo "  Commit : ${{ github.sha }}"
            echo "══════════════════════════════════════════════════"

            # ── 1. Backup pré-déploiement ─────────────────────────
            echo ""
            echo "→ [1/5] Backup de la base de données..."
            BACKUP_DIR="/root/backups/griote"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date '+%Y%m%d-%H%M%S').sql.gz"
            docker compose -f docker-compose.prod.yml exec -T postgres \
              pg_dump -U "$DB_USER" "$DB_NAME" | gzip > "$BACKUP_FILE"
            echo "  Backup sauvegardé : $BACKUP_FILE"

            # Garder seulement les 10 derniers backups pre-deploy
            ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +11 | xargs rm -f || true

            # ── 2. Pull des images ────────────────────────────────
            echo ""
            echo "→ [2/5] Pull des images Docker..."
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # ── 3. Démarrage infra + migrations ──────────────────
            echo ""
            echo "→ [3/5] Démarrage infra (PostgreSQL, MinIO)..."
            docker network inspect traefik-public >/dev/null 2>&1 || \
              docker network create traefik-public

            docker compose -f docker-compose.prod.yml up -d --no-recreate postgres minio

            echo "  Attente PostgreSQL..."
            timeout 60 sh -c \
              'until docker compose -f docker-compose.prod.yml exec -T postgres \
                pg_isready -U $DB_USER -d $DB_NAME >/dev/null 2>&1; \
              do sleep 3; done'

            echo ""
            echo "→ [4/5] Migrations base de données..."
            docker compose -f docker-compose.prod.yml run --rm \
              -e NODE_ENV=production \
              backend npx sequelize-cli db:migrate

            echo "  Seeds de production (idempotent)..."
            docker compose -f docker-compose.prod.yml run --rm \
              -e NODE_ENV=production \
              backend npx sequelize-cli db:seed:all --seeders-path seeders/prod

            # ── 4. Déploiement ────────────────────────────────────
            echo ""
            echo "→ [5/5] Déploiement des services..."
            docker compose -f docker-compose.prod.yml up -d backend --remove-orphans

            echo "  Attente backend..."
            for i in $(seq 1 15); do
              if docker compose -f docker-compose.prod.yml exec -T backend \
                  wget -qO- http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "  Backend healthy (tentative $i)"
                break
              fi
              echo "  Tentative $i/15 — pas encore prêt, retry dans 4s..."
              sleep 4
              if [ "$i" -eq 15 ]; then
                echo "  Warning: health check timeout, déploiement frontend quand même"
              fi
            done

            docker compose -f docker-compose.prod.yml up -d frontend --remove-orphans

            # ── Cleanup ───────────────────────────────────────────
            echo ""
            echo "→ Nettoyage des images (> 24h)..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true

            # ── Statut final ──────────────────────────────────────
            echo ""
            echo "→ Statut des services :"
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Déploiement terminé — $(date '+%H:%M:%S UTC')"
            echo "══════════════════════════════════════════════════"
