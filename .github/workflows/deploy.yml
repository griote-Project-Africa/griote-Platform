# =============================================================================
# Griote Platform — Unified CI/CD Pipeline
# =============================================================================
#
# Triggered: push to main, or manual dispatch (workflow_dispatch)
#
# Jobs:
#   1. changes        — detect which parts of the codebase changed
#   2. build-backend  — build & push backend Docker image  (parallel)
#   3. build-frontend — build & push frontend Docker image (parallel)
#   4. deploy         — SSH into server, deploy everything in order
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   — Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token (not password)
#   SERVER_HOST          — Production server IP or hostname
#   SERVER_USER          — SSH username (e.g. root)
#   SERVER_SSH_KEY       — Private SSH key (PEM format)
#
# Server prerequisites:
#   - Docker + Docker Compose plugin installed
#   - Traefik running on network "traefik-proxy"
#   - /root/griote/.env file present (from .env.example)
#   - /root/griote/ directory exists
# =============================================================================

name: Deploy — Griote Platform

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to rebuild and deploy"
        required: false
        default: "all"
        type: choice
        options: [all, backend, frontend]

env:
  BACKEND_IMAGE:  brandoniscoding/backend-griote
  FRONTEND_IMAGE: brandoniscoding/frontend-griote
  DEPLOY_PATH:    /root/griote

jobs:
  # ---------------------------------------------------------------------------
  # CHANGES — Skip rebuilds for unchanged services
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

  # ---------------------------------------------------------------------------
  # BUILD BACKEND — Runs in parallel with build-frontend
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: changes
    # Build if: backend files changed, or manual dispatch for backend/all
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event.inputs.service == 'backend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          # Scope-isolated cache: backend and frontend don't share cache
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ---------------------------------------------------------------------------
  # BUILD FRONTEND — Runs in parallel with build-backend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event.inputs.service == 'frontend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ---------------------------------------------------------------------------
  # DEPLOY — Single SSH session, ordered deployment
  # Runs after both builds (or after whichever ran), never if either failed
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # Run if: both builds succeeded OR were skipped (no changes), never if failed
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Copy the unified docker-compose.prod.yml to the server
      - name: Upload docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          source:   "docker-compose.prod.yml"
          target:   "${{ env.DEPLOY_PATH }}/"
          overwrite: true

      # Single SSH session: pull images → start infra → wait → start API → start frontend
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.SERVER_HOST }}
          username:        ${{ secrets.SERVER_USER }}
          key:             ${{ secrets.SERVER_SSH_KEY }}
          timeout:         60s
          command_timeout: 15m
          script: |
            set -euo pipefail

            cd ${{ env.DEPLOY_PATH }}

            echo "══════════════════════════════════════════════════"
            echo "  Griote Platform — Deployment"
            echo "  Date   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
            echo "  Commit : ${{ github.sha }}"
            echo "══════════════════════════════════════════════════"

            # ── Pull latest images ────────────────────────────────
            echo ""
            echo "→ Pulling Docker images..."
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # ── Ensure Traefik network exists ────────────────────
            docker network inspect traefik-proxy >/dev/null 2>&1 || \
              docker network create traefik-proxy

            # ── Infrastructure (PostgreSQL + MinIO) ───────────────
            echo ""
            echo "→ Starting infrastructure (PostgreSQL, MinIO)..."
            docker compose -f docker-compose.prod.yml up -d --no-recreate postgres minio

            echo "→ Waiting for PostgreSQL to be ready..."
            timeout 60 sh -c \
              'until docker compose -f docker-compose.prod.yml exec -T postgres \
                pg_isready -U $DB_USER -d $DB_NAME >/dev/null 2>&1; \
              do sleep 3; done' || echo "  Warning: PostgreSQL readiness check timed out"

            # ── Backend API ───────────────────────────────────────
            echo ""
            echo "→ Deploying backend API..."
            docker compose -f docker-compose.prod.yml up -d backend --remove-orphans

            echo "→ Waiting for backend to be healthy..."
            for i in $(seq 1 15); do
              if docker compose -f docker-compose.prod.yml exec -T backend \
                  wget -qO- http://localhost:3000/health >/dev/null 2>&1; then
                echo "  Backend is healthy (attempt $i)"
                break
              fi
              echo "  Attempt $i/15 — not ready yet, retrying in 4s..."
              sleep 4
              if [ "$i" -eq 15 ]; then
                echo "  Warning: Backend health check timed out, deploying frontend anyway"
              fi
            done

            # ── Frontend ──────────────────────────────────────────
            echo ""
            echo "→ Deploying frontend..."
            docker compose -f docker-compose.prod.yml up -d frontend --remove-orphans

            # ── Cleanup stale images ──────────────────────────────
            echo ""
            echo "→ Cleaning up unused images (older than 24h)..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true

            # ── Final status ──────────────────────────────────────
            echo ""
            echo "→ Service status:"
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Deployment complete — $(date '+%H:%M:%S UTC')"
            echo "══════════════════════════════════════════════════"
