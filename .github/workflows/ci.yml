# =============================================================================
# Griote Platform — CI Pipeline (Pull Requests)
# =============================================================================
#
# Déclenché sur chaque PR vers main.
# Fait uniquement : lint + tests unitaires.
# Jamais de build Docker, jamais de déploiement sur le VPS.
#
# Required GitHub Secrets: aucun (pipeline purement local)
# =============================================================================

name: CI — Tests & Lint

on:
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # BACKEND — lint + tests unitaires
  # ---------------------------------------------------------------------------
  test-backend:
    name: Backend — tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     griote_test
          POSTGRES_PASSWORD: griote_test
          POSTGRES_DB:       griote_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U griote_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DB_URI:   postgres://griote_test:griote_test@localhost:5432/griote_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        run: npm run db:migrate

      - name: Run unit tests
        working-directory: backend
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # FRONTEND — build de vérification
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
