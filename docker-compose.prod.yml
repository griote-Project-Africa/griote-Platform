# =============================================================================
# Griote Platform — Production Stack
# =============================================================================
#
# Services: PostgreSQL · MinIO · Backend API · Frontend (Nginx/SPA)
#
# Prerequisites on the server:
#   - Docker + Docker Compose plugin installed
#   - Traefik running on network "traefik-public" (see /root/traefik/)
#   - .env file at /root/griote/.env  (copy from .env.example, fill secrets)
#
# First-time setup:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml up -d
#
# Daily operations:
#   docker compose -f docker-compose.prod.yml ps
#   docker compose -f docker-compose.prod.yml logs -f backend
#   docker compose -f docker-compose.prod.yml restart backend
#   docker compose -f docker-compose.prod.yml down
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: griote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 15s
    networks:
      - griote-internal

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (documents, images)
  # Console:  https://minio.griote.org
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: griote-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.griote-minio.rule=Host(`minio.griote.org`)"
      - "traefik.http.routers.griote-minio.entrypoints=websecure"
      - "traefik.http.routers.griote-minio.tls.certresolver=le"
      - "traefik.http.services.griote-minio.loadbalancer.server.port=9001"
    networks:
      - griote-internal
      - traefik-public

  # ---------------------------------------------------------------------------
  # Backend API — Express.js REST API
  # API:      https://api.griote.org
  # ---------------------------------------------------------------------------
  backend:
    image: brandoniscoding/backend-griote:latest
    container_name: griote-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - backend_logs:/usr/src/app/logs
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.griote-api.rule=Host(`api.griote.org`)"
      - "traefik.http.routers.griote-api.entrypoints=websecure"
      - "traefik.http.routers.griote-api.tls.certresolver=le"
      - "traefik.http.services.griote-api.loadbalancer.server.port=3000"
    networks:
      - griote-internal
      - traefik-public

  # ---------------------------------------------------------------------------
  # Frontend — React SPA served by Nginx
  # Site:     https://griote.org
  # ---------------------------------------------------------------------------
  frontend:
    image: brandoniscoding/frontend-griote:latest
    container_name: griote-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.griote.rule=Host(`project-africa.griote.org`)"
      - "traefik.http.routers.griote.entrypoints=websecure"
      - "traefik.http.routers.griote.tls.certresolver=le"
      - "traefik.http.services.griote.loadbalancer.server.port=80"
    networks:
      - griote-internal
      - traefik-public

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: griote_postgres_data
  minio_data:
    name: griote_minio_data
  backend_logs:
    name: griote_backend_logs

# =============================================================================
# Networks
# =============================================================================
networks:
  # Internal network — services communicate here, not exposed externally
  griote-internal:
    name: griote-internal
    driver: bridge

  # External network managed by Traefik — already exists on the server
  traefik-public:
    name: traefik-public
    external: true
