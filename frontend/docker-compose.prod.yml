# =============================================================================
# Frontend — Production (standalone)
# =============================================================================
# Normalized alias for docker-compose.yml (kept for backward compatibility)
#
# NOTE: For full-stack deployment (backend + frontend), prefer:
#   docker compose -f ../docker-compose.prod.yml up -d
#
# This file deploys the frontend only (backend must already be running):
#   docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:

  frontend:
    image: brandoniscoding/frontend-griote:latest
    container_name: griote-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.griote.rule=Host(`griote.org`, `www.griote.org`)"
      - "traefik.http.routers.griote.entrypoints=websecure"
      - "traefik.http.routers.griote.tls.certresolver=le"
      - "traefik.http.services.griote.loadbalancer.server.port=80"
      - "traefik.http.middlewares.www-to-apex.redirectregex.regex=^https://www\\.griote\\.org/(.*)"
      - "traefik.http.middlewares.www-to-apex.redirectregex.replacement=https://griote.org/$${1}"
      - "traefik.http.middlewares.www-to-apex.redirectregex.permanent=true"
      - "traefik.http.routers.griote.middlewares=www-to-apex"
    networks:
      - griote-internal
      - traefik-proxy

networks:
  # Must already exist — created by backend stack or root docker-compose.prod.yml
  griote-internal:
    name: griote-internal
    external: true
  traefik-proxy:
    name: traefik-proxy
    external: true
