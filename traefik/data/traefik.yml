# Traefik Configuration File
# ========================

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: griote-backend-net
  file:
    directory: /config
    watch: true

certificatesResolvers:
  le:
    acme:
      email: contact@griote.org
      storage: acme.json
      httpChallenge:
        entryPoint: web
      # tlsChallenge: true

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
